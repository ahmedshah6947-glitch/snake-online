<!DOCTYPE html>
<html>
<head>
    <title>Snake.io</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">

    <h1>Snake.io</h1>

    <input
        id="nameInput"
        placeholder="Enter Name"
    >

    <br>

    <button id="playBtn">
        PLAY
    </button>

</div>

<div id="deathScreen" style="display:none;">

    <h1>You Died</h1>

    <h2 id="finalScore">
        Score: 0
    </h2>

    <button id="respawnBtn">
        Respawn
    </button>

</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script src="game.js"></script>

</body>
</html>
